<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹏飞 & 阿宇 - 结婚一周年纪念 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; }
            50% { transform: translateY(-120px) rotate(15deg) scale(1.2); opacity: 1; }
        }

        @keyframes heartPop {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg) translateY(-50px); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes ringExpand {
            0% { width: 10px; height: 10px; opacity: 1; border-width: 4px; }
            100% { width: 200px; height: 200px; opacity: 0; border-width: 1px; }
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1); opacity: 0; }
        }

        @keyframes fireworkParticle {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }

        @keyframes fireworkFlash {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: fadeInDown 1s ease;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            animation: fadeInDown 1s ease 0.3s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Photo section */
        .photo-section {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .photo-frame {
            width: 200px;
            height: 260px;
            background: #fff;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
            position: relative;
        }

        .photo-wrapper:nth-child(2) .photo-frame {
            transform: rotate(3deg);
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.08);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .photo-wrapper:nth-child(2) .photo-frame:hover {
            transform: rotate(0deg) scale(1.08);
        }

        .photo-frame img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .photo-label {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Clickable heart button */
        .heart-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        .heart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.6);
        }

        .heart-btn:active {
            transform: scale(0.95);
        }

        .click-count {
            font-size: 1.1rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Total counter */
        .total-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px 40px;
            margin-bottom: 40px;
            display: inline-block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            animation: fadeInUp 1s ease 0.6s both;
        }

        .total-label {
            font-size: 1rem;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .total-count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        /* Timer section */
        .timer-section {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 25px 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease 0.7s both;
        }

        .timer-title {
            font-size: 1.3rem;
            color: #ff6b6b;
            margin-bottom: 15px;
            text-align: center;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: nowrap;
        }

        .time-unit {
            text-align: center;
        }

        .time-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff6b6b;
            background: #fff5f5;
            border-radius: 12px;
            padding: 10px 15px;
            min-width: 60px;
            box-shadow: inset 0 2px 10px rgba(255,107,107,0.1);
        }

        .time-label {
            margin-top: 5px;
            font-size: 0.75rem;
            color: #888;
        }

        .time-label {
            margin-top: 5px;
            font-size: 0.7rem;
            color: #888;
        }

        /* Love letter section */
        .letter-section {
            background: #fff;
            border-radius: 20px;
            padding: 30px 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease 0.9s both;
            text-align: center;
        }

        .letter-title {
            font-size: 1.3rem;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .letter-content {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            text-align: center;
        }
            line-height: 2;
            color: #555;
            text-align: left;
        }

        /* Footer */
        .footer {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            animation: fadeIn 1s ease 1.1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Click effect */
        .click-effect {
            position: absolute;
            pointer-events: none;
            animation: heartPop 0.5s ease-out forwards;
        }

        /* Music player */
        .music-player {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-player:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .music-icon {
            font-size: 24px;
            animation: musicRotate 3s linear infinite;
            display: inline-block;
        }

        .music-player.playing .music-icon {
            animation-play-state: running;
        }

        .music-player:not(.playing) .music-icon {
            animation-play-state: paused;
        }

        @keyframes musicRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-name {
            font-size: 0.85rem;
            color: #333;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-control {
            background: #ff6b6b;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color cursor: white;
           : pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .photo-frame { width: 150px; height: 200px; }
            .photo-frame img { height: 180px; }
            .time-value { font-size: 2rem; padding: 10px 15px; min-width: 70px; }
            .photo-section { gap: 30px; }
        }
    </style>
</head>
<body>
    <!-- Floating hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Music Player -->
    <div class="music-player" id="musicPlayer" onclick="toggleMusic()">
    <span class="music-icon">🎵</span>
    <span class="music-name">Lucky Me - Jake Miller</span>
    <button class="music-control" id="musicBtn">▶</button>
    </div>
    
    <audio id="bgm" loop autoplay>
        <source src="music/lucky.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>💑 鹏飞 & 阿宇 结婚周年快乐 💑</h1>
        <p class="subtitle">感谢与你相遇相知的每一天</p>

        <!-- Photo section with hearts -->
        <div class="photo-section">
            <div class="photo-wrapper">
                <div class="photo-frame">
                    <img src="images/husband.jpg" alt="老公照片">
                </div>
                <div class="photo-label">鹏飞</div>
                <button class="heart-btn" onclick="clickHeart('husband')">❤️</button>
                <div class="click-count">❤️ <span id="husband-count">0</span> 次</div>
            </div>
            <div class="photo-wrapper">
                <div class="photo-frame">
                    <img src="images/wife.jpg" alt="老婆照片">
                </div>
                <div class="photo-label">阿宇</div>
                <button class="heart-btn" onclick="clickHeart('wife')">❤️</button>
                <div class="click-count">❤️ <span id="wife-count">0</span> 次</div>
            </div>
        </div>

        <!-- Total clicks -->
        <div class="total-section">
            <div class="total-label">💕 爱的总点击</div>
            <div class="total-count">❤️ <span id="total-count">0</span></div>
            <button onclick="generateSyncCode()" style="margin-top:10px;padding:8px 16px;background:#ff6b6b;border:none;border-radius:20px;color:white;cursor:pointer;font-size:0.85rem;">🔗 同步给他/她</button>
        </div>

        <!-- Timer section -->
        <div class="timer-section">
            <div class="timer-title">⏰ 我们已经相爱了</div>
            <div class="timer">
                <div class="time-unit">
                    <div class="time-value" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">0</div>
                    <div class="time-label">小时</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">0</div>
                    <div class="time-label">分钟</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <!-- Love letter section -->
        <div class="letter-section">
            <div class="letter-title">
                <span>💌</span> 给最爱的你
            </div>
            <div class="letter-content">
                <p style="margin-bottom: 15px;">亲爱的阿宇：</p>
                <p>从我们牵起彼此手的那一刻起，我的世界就充满了幸福的光彩。</p>
                <p>感谢你一直以来的陪伴、理解和支持。</p>
                <p>未来的每一天，我都愿意与你携手度过。</p>
                <p style="margin-top: 15px; font-size: 1.2rem;">💕 结婚周年快乐 💕</p>
                <p style="margin-top: 10px; color: #888;">— 爱你的鹏飞</p>
            </div>
        </div>

        <div class="footer">
            <p>🎵 永远爱你 🎵</p>
        </div>
    </div>

    <script>
        // Wedding date
        const weddingDate = new Date('2025-03-09 00:00:00');

        // Click counters - local + sync code sharing
        let husbandClicks = parseInt(localStorage.getItem('husbandClicks')) || 0;
        let wifeClicks = parseInt(localStorage.getItem('wifeClicks')) || 0;
        let totalClicks = parseInt(localStorage.getItem('totalClicks')) || 0;

        // Update display on load
        document.getElementById('husband-count').textContent = husbandClicks;
        document.getElementById('wife-count').textContent = wifeClicks;
        document.getElementById('total-count').textContent = totalClicks;

        // Check for sync code in URL
        const urlParams = new URLSearchParams(window.location.search);
        const syncCode = urlParams.get('sync');
        if (syncCode) {
            try {
                const decoded = atob(syncCode);
                const data = JSON.parse(decoded);
                husbandClicks += data.h || 0;
                wifeClicks += data.w || 0;
                totalClicks += data.t || 0;
                document.getElementById('husband-count').textContent = husbandClicks;
                document.getElementById('wife-count').textContent = wifeClicks;
                document.getElementById('total-count').textContent = totalClicks;
                localStorage.setItem('husbandClicks', husbandClicks);
                localStorage.setItem('wifeClicks', wifeClicks);
                localStorage.setItem('totalClicks', totalClicks);
                alert('💕 同步成功！已合并点击次数');
            } catch(e) {}
        }

        // Generate sync code
        function generateSyncCode() {
            const code = btoa(JSON.stringify({h: husbandClicks, w: wifeClicks, t: totalClicks}));
            const syncUrl = window.location.origin + window.location.pathname + '?sync=' + code;
            navigator.clipboard.writeText(syncUrl).then(() => {
                alert('💕 同步链接已复制！发给对方点一下就能累加~');
            }).catch(() => {
                prompt('复制发给对方:', syncUrl);
            });
        }

        // Heart click handler - saves to localStorage
        function clickHeart(person) {
            if (person === 'husband') {
                husbandClicks++;
                document.getElementById('husband-count').textContent = husbandClicks;
            } else {
                wifeClicks++;
                document.getElementById('wife-count').textContent = wifeClicks;
            }
            totalClicks++;
            document.getElementById('total-count').textContent = totalClicks;
            
            // Save to localStorage
            localStorage.setItem('husbandClicks', husbandClicks);
            localStorage.setItem('wifeClicks', wifeClicks);
            localStorage.setItem('totalClicks', totalClicks);
            
            // Screen shake on EVERY click
            shakeScreen(totalClicks);
            
            // Ring effect on EVERY click
            createRingEffectOnClick(person, totalClicks);
            
            // Fireworks on EVERY click - bigger with more clicks!
            createFirework(totalClicks);
            else if (totalClicks === 20) createBurstEffect('super');
            else if (totalClicks === 50) createBurstEffect('mega');
            else if (totalClicks % 10 === 0 && totalClicks > 0) createBurstEffect('normal');
        }

        // Screen shake - EVERY click, stronger with more clicks (max at 10000)
        function shakeScreen(clicks) {
            const intensity = Math.min(clicks / 10000, 1); // 0-1 scale, max at 10000
            const shakeAmount = 2 + intensity * 18; // 2-20px
            
            const body = document.body;
            body.style.transition = 'none';
            
            // Multiple shakes for stronger effect
            let shakeCount = Math.floor(1 + intensity * 5); // 1-6 shakes
            let totalDuration = 50 + intensity * 200;
            
            let startTime = Date.now();
            function shake() {
                let elapsed = Date.now() - startTime;
                if (elapsed < totalDuration) {
                    let x = (Math.random() - 0.5) * shakeAmount;
                    let y = (Math.random() - 0.5) * shakeAmount;
                    body.style.transform = `translate(${x}px, ${y}px)`;
                    requestAnimationFrame(shake);
                } else {
                    body.style.transform = '';
                }
            }
            shake();
        }

        // Ring effect on EVERY click - more rings & faster with more clicks
        function createRingEffectOnClick(person, clicks) {
            const btn = document.querySelector(`button[onclick="clickHeart('${person}')"]`);
            const rect = btn.getBoundingClientRect();
            
            // More rings with more clicks (1-8 rings), faster with more clicks
            const ringCount = Math.min(1 + Math.floor(clicks / 500), 8);
            const delay = Math.max(50 - Math.floor(clicks / 200) * 10, 10); // 50ms down to 10ms
            
            for (let i = 0; i < ringCount; i++) {
                setTimeout(() => {
                    const ring = document.createElement('div');
                    ring.style.position = 'fixed';
                    ring.style.left = (rect.left + rect.width/2) + 'px';
                    ring.style.top = (rect.top + rect.height/2) + 'px';
                    ring.style.width = '10px';
                    ring.style.height = '10px';
                    ring.style.borderRadius = '50%';
                    ring.style.border = `3px solid rgba(255, 107, 107, 0.9)`;
                    ring.style.transform = 'translate(-50%, -50%)';
                    ring.style.zIndex = '999';
                    ring.style.pointerEvents = 'none';
                    
                    // Faster expansion with more clicks
                    const duration = Math.max(0.6 - (clicks / 20000), 0.2);
                    ring.style.animation = `ringExpand ${duration}s ease-out forwards`;
                    
                    document.body.appendChild(ring);
                    setTimeout(() => ring.remove(), duration * 1000);
                }, i * delay);
            }
        }

        // Click handler - fireworks EVERY click!
        function clickHeart(person) {
            if (person === 'husband') {
                husbandClicks++;
                document.getElementById('husband-count').textContent = husbandClicks;
                localStorage.setItem('husbandClicks', husbandClicks);
            } else {
                wifeClicks++;
                document.getElementById('wife-count').textContent = wifeClicks;
                localStorage.setItem('wifeClicks', wifeClicks);
            }
            totalClicks++;
            document.getElementById('total-count').textContent = totalClicks;
            localStorage.setItem('totalClicks', totalClicks);
            
            // Screen shake on EVERY click
            shakeScreen(totalClicks);
            
            // Ring effect on EVERY click
            createRingEffectOnClick(person, totalClicks);
            
            // Fireworks on EVERY click - bigger with more clicks!
            createFirework(totalClicks);
        }

        // Firework effect - EVERY click!
        function createRingEffect(rect, intensity) {
            const ring = document.createElement('div');
            ring.style.position = 'fixed';
            ring.style.left = (rect.left + rect.width/2) + 'px';
            ring.style.top = (rect.top + rect.height/2) + 'px';
            ring.style.width = '10px';
            ring.style.height = '10px';
            ring.style.borderRadius = '50%';
            ring.style.border = `${2 + intensity}px solid rgba(255, 107, 107, 0.8)`;
            ring.style.transform = 'translate(-50%, -50%)';
            ring.style.zIndex = '999';
            ring.style.animation = `ringExpand ${0.5 + intensity * 0.1}s ease-out forwards`;
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), (0.5 + intensity * 0.1) * 1000);
        }

        // Firework effect - EVERY click! Bigger with more clicks!
        function createFirework(clicks) {
            const x = 20 + Math.random() * 60;
            const y = 10 + Math.random() * 30;
            const intensity = Math.min(clicks / 500, 3);
            const particleCount = 8 + Math.floor(intensity * 8);
            const colors = ['#ff6b6b', '#ff8e8e', '#ffa500', '#ffd700', '#ff69b4', '#c71585', '#00ff7f', '#00ced1', '#ff4500', '#da70d6', '#32cd32', '#1e90ff'];
            
            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.style.position = 'fixed';
                    p.style.left = x + '%';
                    p.style.top = y + '%';
                    p.style.width = (4 + intensity * 2) + 'px';
                    p.style.height = p.style.width;
                    p.style.borderRadius = '50%';
                    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    p.style.boxShadow = `0 0 ${6 + intensity * 4}px ${p.style.backgroundColor}`;
                    p.style.zIndex = '100';
                    p.style.pointerEvents = 'none';
                    p.style.animation = `fireworkParticle ${0.8 + intensity * 0.3}s ease-out forwards`;
                    
                    const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.5;
                    const velocity = 50 + intensity * 30 + Math.random() * 50;
                    p.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
                    p.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
                    
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), (0.8 + intensity * 0.3) * 1000);
                }, i * 15);
            }
            
            // Flash
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.left = x + '%';
            flash.style.top = y + '%';
            flash.style.width = '10px';
            flash.style.height = '10px';
            flash.style.borderRadius = '50%';
            flash.style.backgroundColor = '#fff';
            flash.style.boxShadow = `0 0 ${20 + intensity * 20}px #fff`;
            flash.style.zIndex = '99';
            flash.style.pointerEvents = 'none';
            flash.style.animation = 'fireworkFlash 0.3s ease-out forwards';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);
        }

        // Burst effects for milestones
        function createBurstEffect(type) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            let count, size, duration;
            switch(type) {
                case 'mega': count = 50; size = 40; duration = 2; break;
                case 'super': count = 30; size = 35; duration = 1.5; break;
                case 'levelup': count = 20; size = 30; duration = 1.2; break;
                default: count = 15; size = 25; duration = 1;
            }
            
            const hearts = getHeartsForLevel(type === 'mega' ? 10 : type === 'super' ? 7 : 5);
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.position = 'fixed';
                    heart.style.left = centerX + 'px';
                    heart.style.top = centerY + 'px';
                    heart.style.fontSize = size + 'px';
                    heart.style.zIndex = '1000';
                    heart.style.animation = `burst ${duration}s ease-out forwards`;
                    heart.style.pointerEvents = 'none';
                    
                    const angle = (Math.PI * 2 * i) / count;
                    const distance = 200 + Math.random() * 300;
                    heart.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    heart.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), duration * 1000);
                }, i * 20);
            }
        }

        // Add extra floating hearts
        function addExtraHearts(count) {
            const heartsContainer = document.getElementById('heartsBg');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝'];
            
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = (80 + Math.random() * 20) + '%';
                heart.style.animationDelay = Math.random() * 3 + 's';
                heart.style.animationDuration = (4 + Math.random() * 3) + 's';
                heart.style.fontSize = (15 + Math.random() * 20) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        // Create fireworks effect
        function createFireworks() {
            const container = document.querySelector('.container');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝', '🎆', '✨'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                    heart.style.position = 'fixed';
                    heart.style.left = (30 + Math.random() * 40) + '%';
                    heart.style.top = (30 + Math.random() * 30) + '%';
                    heart.style.fontSize = (30 + Math.random() * 30) + 'px';
                    heart.style.animation = 'heartPop 1s ease-out forwards';
                    heart.style.zIndex = '100';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 1000);
                }, i * 50);
            }
        }

        // Update timer
        function updateTimer() {
            const now = new Date();
            const diff = now - weddingDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('heartsBg');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝'];

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        createHearts();

        // Music player - Auto play on load
        const bgm = document.getElementById('bgm');
        const musicPlayer = document.getElementById('musicPlayer');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        // Auto play on load - try multiple times
        function tryAutoPlay() {
            bgm.volume = 0.5;
            const playPromise = bgm.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    musicBtn.textContent = '⏸';
                    musicPlayer.classList.add('playing');
                }).catch(e => {
                    // 浏览器阻止自动播放，等待用户点击
                });
            }
        }

        // Try immediately
        tryAutoPlay();

        // Also try on load
        window.addEventListener('load', tryAutoPlay);

        // Also try on first user interaction
        document.addEventListener('click', function() {
            if (!isPlaying) {
                tryAutoPlay();
            }
        }, { once: true });

        function toggleMusic() {
            if (isPlaying) {
                bgm.pause();
                musicBtn.textContent = '▶';
                musicPlayer.classList.remove('playing');
            } else {
                bgm.play();
                musicBtn.textContent = '⏸';
                musicPlayer.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
