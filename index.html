<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹏飞 & 阿宇 - 结婚一周年纪念 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; }
            50% { transform: translateY(-120px) rotate(15deg) scale(1.2); opacity: 1; }
        }

        @keyframes heartPop {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg) translateY(-50px); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes ringExpand {
            0% { width: 10px; height: 10px; opacity: 1; border-width: 4px; }
            100% { width: 200px; height: 200px; opacity: 0; border-width: 1px; }
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: fadeInDown 1s ease;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            animation: fadeInDown 1s ease 0.3s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Photo section */
        .photo-section {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .photo-frame {
            width: 200px;
            height: 260px;
            background: #fff;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
            position: relative;
        }

        .photo-wrapper:nth-child(2) .photo-frame {
            transform: rotate(3deg);
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .photo-frame img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .photo-label {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Clickable heart button */
        .heart-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        .heart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.6);
        }

        .heart-btn:active {
            transform: scale(0.95);
        }

        .click-count {
            font-size: 1.1rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Total counter */
        .total-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px 40px;
            margin-bottom: 40px;
            display: inline-block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            animation: fadeInUp 1s ease 0.6s both;
        }

        .total-label {
            font-size: 1rem;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .total-count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        /* Timer section */
        .timer-section {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease 0.7s both;
        }

        .timer-title {
            font-size: 1.5rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .time-unit {
            text-align: center;
        }

        .time-value {
            font-size: 3rem;
            font-weight: bold;
            color: #ff6b6b;
            background: #fff5f5;
            border-radius: 15px;
            padding: 15px 25px;
            min-width: 100px;
            box-shadow: inset 0 2px 10px rgba(255,107,107,0.1);
        }

        .time-label {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }

        /* Love letter section */
        .letter-section {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease 0.9s both;
        }

        .letter-title {
            font-size: 1.3rem;
            color: #ff6b6b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .letter-content {
            font-size: 1.1rem;
            line-height: 2;
            color: #555;
            text-align: left;
        }

        /* Footer */
        .footer {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            animation: fadeIn 1s ease 1.1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Click effect */
        .click-effect {
            position: absolute;
            pointer-events: none;
            animation: heartPop 0.5s ease-out forwards;
        }

        /* Music player */
        .music-player {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-player:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .music-icon {
            font-size: 24px;
            animation: musicRotate 3s linear infinite;
            display: inline-block;
        }

        .music-player.playing .music-icon {
            animation-play-state: running;
        }

        .music-player:not(.playing) .music-icon {
            animation-play-state: paused;
        }

        @keyframes musicRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-name {
            font-size: 0.85rem;
            color: #333;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-control {
            background: #ff6b6b;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color cursor: white;
           : pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .photo-frame { width: 150px; height: 200px; }
            .photo-frame img { height: 180px; }
            .time-value { font-size: 2rem; padding: 10px 15px; min-width: 70px; }
            .photo-section { gap: 30px; }
        }
    </style>
</head>
<body>
    <!-- Floating hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Music Player -->
    <div class="music-player" id="musicPlayer" onclick="toggleMusic()">
        <span class="music-icon">🎵</span>
        <span class="music-name">Lucky - Jake Miller</span>
        <button class="music-control" id="musicBtn">▶</button>
    </div>

    <audio id="bgm" loop autoplay>
        <source src="music/lucky.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>💑 鹏飞 & 阿宇 结婚周年快乐 💑</h1>
        <p class="subtitle">感谢与你相遇相知的每一天</p>

        <!-- Photo section with hearts -->
        <div class="photo-section">
            <div class="photo-wrapper">
                <div class="photo-frame">
                    <img src="images/husband.jpg" alt="老公照片">
                </div>
                <div class="photo-label">鹏飞</div>
                <button class="heart-btn" onclick="clickHeart('husband')">❤️</button>
                <div class="click-count">❤️ <span id="husband-count">0</span> 次</div>
            </div>
            <div class="photo-wrapper">
                <div class="photo-frame">
                    <img src="images/wife.jpg" alt="老婆照片">
                </div>
                <div class="photo-label">阿宇</div>
                <button class="heart-btn" onclick="clickHeart('wife')">❤️</button>
                <div class="click-count">❤️ <span id="wife-count">0</span> 次</div>
            </div>
        </div>

        <!-- Total clicks -->
        <div class="total-section">
            <div class="total-label">💕 爱的总点击</div>
            <div class="total-count">❤️ <span id="total-count">0</span></div>
        </div>

        <!-- Timer section -->
        <div class="timer-section">
            <div class="timer-title">⏰ 我们已经相爱了</div>
            <div class="timer">
                <div class="time-unit">
                    <div class="time-value" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">0</div>
                    <div class="time-label">小时</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">0</div class="time-label>
                    <div">分钟</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <!-- Love letter section -->
        <div class="letter-section">
            <div class="letter-title">
                <span>💌</span> 给最爱的你
            </div>
            <div class="letter-content">
                亲爱的阿宇：<br><br>
                从我们牵起彼此手的那一刻起，我的世界就充满了幸福的光彩。<br><br>
                感谢你一直以来的陪伴、理解和支持。<br>
                未来的每一天，我都愿意与你携手度过。<br><br>
                💕 结婚周年快乐 💕<br>
                <br>
                — 爱你的鹏飞
            </div>
        </div>

        <div class="footer">
            <p>🎵 永远爱你 🎵</p>
        </div>
    </div>

    <script>
        // Wedding date
        const weddingDate = new Date('2025-03-09 00:00:00');

        // Click counters - load from localStorage
        let husbandClicks = parseInt(localStorage.getItem('husbandClicks')) || 0;
        let wifeClicks = parseInt(localStorage.getItem('wifeClicks')) || 0;
        let totalClicks = parseInt(localStorage.getItem('totalClicks')) || 0;

        // Update display on load
        document.getElementById('husband-count').textContent = husbandClicks;
        document.getElementById('wife-count').textContent = wifeClicks;
        document.getElementById('total-count').textContent = totalClicks;

        // No cooldown - can click rapidly!
        
        // Heart click handler
        function clickHeart(person) {
            if (person === 'husband') {
                husbandClicks++;
                document.getElementById('husband-count').textContent = husbandClicks;
                localStorage.setItem('husbandClicks', husbandClicks);
            } else {
                wifeClicks++;
                document.getElementById('wife-count').textContent = wifeClicks;
                localStorage.setItem('wifeClicks', wifeClicks);
            }
            totalClicks++;
            document.getElementById('total-count').textContent = totalClicks;
            localStorage.setItem('totalClicks', totalClicks);
            
            // ALWAYS create click effect - no cooldown!
            createClickEffect(person, totalClicks);
            
            // Screen shake on EVERY click - stronger with more clicks (max at 10000)
            shakeScreen(totalClicks);
            
            // Ring effect on EVERY click - more rings & faster with more clicks
            createRingEffectOnClick(person, totalClicks);
            
            // Burst effects at milestones
            if (totalClicks === 5) createBurstEffect('levelup');
            else if (totalClicks === 20) createBurstEffect('super');
            else if (totalClicks === 50) createBurstEffect('mega');
            else if (totalClicks % 10 === 0 && totalClicks > 0) createBurstEffect('normal');
        }

        // Screen shake - EVERY click, stronger with more clicks (max at 10000)
        function shakeScreen(clicks) {
            const intensity = Math.min(clicks / 10000, 1); // 0-1 scale, max at 10000
            const shakeAmount = 2 + intensity * 18; // 2-20px
            
            const body = document.body;
            body.style.transition = 'none';
            
            // Multiple shakes for stronger effect
            let shakeCount = Math.floor(1 + intensity * 5); // 1-6 shakes
            let totalDuration = 50 + intensity * 200;
            
            let startTime = Date.now();
            function shake() {
                let elapsed = Date.now() - startTime;
                if (elapsed < totalDuration) {
                    let x = (Math.random() - 0.5) * shakeAmount;
                    let y = (Math.random() - 0.5) * shakeAmount;
                    body.style.transform = `translate(${x}px, ${y}px)`;
                    requestAnimationFrame(shake);
                } else {
                    body.style.transform = '';
                }
            }
            shake();
        }

        // Ring effect on EVERY click - more rings & faster with more clicks
        function createRingEffectOnClick(person, clicks) {
            const btn = document.querySelector(`button[onclick="clickHeart('${person}')"]`);
            const rect = btn.getBoundingClientRect();
            
            // More rings with more clicks (1-8 rings), faster with more clicks
            const ringCount = Math.min(1 + Math.floor(clicks / 500), 8);
            const delay = Math.max(50 - Math.floor(clicks / 200) * 10, 10); // 50ms down to 10ms
            
            for (let i = 0; i < ringCount; i++) {
                setTimeout(() => {
                    const ring = document.createElement('div');
                    ring.style.position = 'fixed';
                    ring.style.left = (rect.left + rect.width/2) + 'px';
                    ring.style.top = (rect.top + rect.height/2) + 'px';
                    ring.style.width = '10px';
                    ring.style.height = '10px';
                    ring.style.borderRadius = '50%';
                    ring.style.border = `3px solid rgba(255, 107, 107, 0.9)`;
                    ring.style.transform = 'translate(-50%, -50%)';
                    ring.style.zIndex = '999';
                    ring.style.pointerEvents = 'none';
                    
                    // Faster expansion with more clicks
                    const duration = Math.max(0.6 - (clicks / 20000), 0.2);
                    ring.style.animation = `ringExpand ${duration}s ease-out forwards`;
                    
                    document.body.appendChild(ring);
                    setTimeout(() => ring.remove(), duration * 1000);
                }, i * delay);
            }
        }

        // Dynamic click effect - MORE CLICKS = COOLER!
        function createClickEffect(person, clicks) {
            const btn = document.querySelector(`button[onclick="clickHeart('${person}')"]`);
            const rect = btn.getBoundingClientRect();
            
            // Intensity increases with clicks (1-10)
            const intensity = Math.min(Math.floor(clicks / 10) + 1, 10);
            const particleCount = 3 + intensity * 2; // More particles at higher clicks
            
            const hearts = getHeartsForLevel(intensity);
            
            for (let i = 0; i < particleCount; i++) {
                const heart = document.createElement('div');
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.className = 'click-effect';
                heart.style.position = 'fixed';
                
                const spread = 50 + intensity * 15;
                heart.style.left = (rect.left + rect.width/2 + (Math.random() - 0.5) * spread) + 'px';
                heart.style.top = (rect.top + (Math.random() - 0.5) * spread * 0.5) + 'px';
                
                const baseSize = 20 + intensity * 5;
                heart.style.fontSize = (baseSize + Math.random() * 20) + 'px';
                
                const duration = 0.5 + (intensity * 0.1);
                heart.style.animation = `heartPop ${duration}s ease-out forwards`;
                
                // Glow effect at high clicks
                if (intensity >= 5) {
                    heart.style.textShadow = `0 0 ${intensity * 3}px rgba(255,${100 + intensity * 15},${100 + intensity * 15},0.8)`;
                }
                
                heart.style.zIndex = '1000';
                heart.style.pointerEvents = 'none';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), duration * 1000);
            }
            
            // Ring shockwave at high clicks
            if (intensity >= 3) {
                createRingEffect(rect, intensity);
            }
        }

        // Hearts array based on level
        function getHeartsForLevel(level) {
            const basic = ['❤️', '💕', '💗'];
            const medium = ['💖', '💘', '💝', '😍'];
            const advanced = ['🥰', '😘', '💓', '💞', '✨', '🌟'];
            const ultimate = ['🎆', '🎇', '💥', '🌈', '⭐', '🫀'];
            
            if (level <= 2) return basic;
            if (level <= 4) return basic.concat(medium);
            if (level <= 6) return medium.concat(advanced);
            if (level <= 8) return advanced.concat(ultimate);
            return ultimate.concat(advanced).concat(medium);
        }

        // Ring shockwave effect
        function createRingEffect(rect, intensity) {
            const ring = document.createElement('div');
            ring.style.position = 'fixed';
            ring.style.left = (rect.left + rect.width/2) + 'px';
            ring.style.top = (rect.top + rect.height/2) + 'px';
            ring.style.width = '10px';
            ring.style.height = '10px';
            ring.style.borderRadius = '50%';
            ring.style.border = `${2 + intensity}px solid rgba(255, 107, 107, 0.8)`;
            ring.style.transform = 'translate(-50%, -50%)';
            ring.style.zIndex = '999';
            ring.style.animation = `ringExpand ${0.5 + intensity * 0.1}s ease-out forwards`;
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), (0.5 + intensity * 0.1) * 1000);
        }

        // Burst effects for milestones
        function createBurstEffect(type) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            let count, size, duration;
            switch(type) {
                case 'mega': count = 50; size = 40; duration = 2; break;
                case 'super': count = 30; size = 35; duration = 1.5; break;
                case 'levelup': count = 20; size = 30; duration = 1.2; break;
                default: count = 15; size = 25; duration = 1;
            }
            
            const hearts = getHeartsForLevel(type === 'mega' ? 10 : type === 'super' ? 7 : 5);
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.position = 'fixed';
                    heart.style.left = centerX + 'px';
                    heart.style.top = centerY + 'px';
                    heart.style.fontSize = size + 'px';
                    heart.style.zIndex = '1000';
                    heart.style.animation = `burst ${duration}s ease-out forwards`;
                    heart.style.pointerEvents = 'none';
                    
                    const angle = (Math.PI * 2 * i) / count;
                    const distance = 200 + Math.random() * 300;
                    heart.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    heart.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), duration * 1000);
                }, i * 20);
            }
        }

        // Add extra floating hearts
        function addExtraHearts(count) {
            const heartsContainer = document.getElementById('heartsBg');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝'];
            
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = (80 + Math.random() * 20) + '%';
                heart.style.animationDelay = Math.random() * 3 + 's';
                heart.style.animationDuration = (4 + Math.random() * 3) + 's';
                heart.style.fontSize = (15 + Math.random() * 20) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        // Create fireworks effect
        function createFireworks() {
            const container = document.querySelector('.container');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝', '🎆', '✨'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                    heart.style.position = 'fixed';
                    heart.style.left = (30 + Math.random() * 40) + '%';
                    heart.style.top = (30 + Math.random() * 30) + '%';
                    heart.style.fontSize = (30 + Math.random() * 30) + 'px';
                    heart.style.animation = 'heartPop 1s ease-out forwards';
                    heart.style.zIndex = '100';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 1000);
                }, i * 50);
            }
        }

        // Update timer
        function updateTimer() {
            const now = new Date();
            const diff = now - weddingDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('heartsBg');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝'];

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        createHearts();

        // Music player - Auto play on load
        const bgm = document.getElementById('bgm');
        const musicPlayer = document.getElementById('musicPlayer');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        // 尝试自动播放
        window.addEventListener('load', function() {
            bgm.volume = 0.5;
            bgm.play().then(() => {
                isPlaying = true;
                musicBtn.textContent = '⏸';
                musicPlayer.classList.add('playing');
            }).catch(e => {
                console.log('自动播放被阻止，点击播放');
            });
        });

        function toggleMusic() {
            if (isPlaying) {
                bgm.pause();
                musicBtn.textContent = '▶';
                musicPlayer.classList.remove('playing');
            } else {
                bgm.play();
                musicBtn.textContent = '⏸';
                musicPlayer.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
