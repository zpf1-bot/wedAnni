<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹏飞 & 阿宇 - 结婚一周年纪念 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-100px) rotate(10deg); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: fadeInDown 1s ease;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            animation: fadeInDown 1s ease 0.3s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Photo frame */
        .photo-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-frame {
            width: 200px;
            height: 260px;
            background: #fff;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }

        .photo-frame:nth-child(2) {
            transform: rotate(3deg);
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .photo-frame img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .photo-label {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
        }

        /* Timer section */
        .timer-section {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease 0.7s both;
        }

        .timer-title {
            font-size: 1.5rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .time-unit {
            text-align: center;
        }

        .time-value {
            font-size: 3rem;
            font-weight: bold;
            color: #ff6b6b;
            background: #fff5f5;
            border-radius: 15px;
            padding: 15px 25px;
            min-width: 100px;
            box-shadow: inset 0 2px 10px rgba(255,107,107,0.1);
        }

        .time-label {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }

        /* Love letter section */
        .letter-section {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease 0.9s both;
        }

        .letter-title {
            font-size: 1.3rem;
            color: #ff6b6b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .letter-content {
            font-size: 1.1rem;
            line-height: 2;
            color: #555;
            text-align: left;
        }

        /* Footer */
        .footer {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            animation: fadeIn 1s ease 1.1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .photo-frame { width: 150px; height: 200px; }
            .photo-frame img { height: 180px; }
            .time-value { font-size: 2rem; padding: 10px 15px; min-width: 70px; }
        }
    </style>
</head>
<body>
    <!-- Floating hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="container">
        <h1>💑 鹏飞 & 阿宇 结婚周年快乐 💑</h1>
        <p class="subtitle">感谢与你相遇相知的每一天</p>

        <!-- Photo section -->
        <div class="photo-section">
            <div class="photo-frame">
                <img src="images/husband.jpg" alt="老公照片">
                <div class="photo-label">鹏飞</div>
            </div>
            <div class="photo-frame">
                <img src="images/wife.jpg" alt="老婆照片">
                <div class="photo-label">阿宇</div>
            </div>
        </div>

        <!-- Timer section -->
        <div class="timer-section">
            <div class="timer-title">⏰ 我们已经相爱了</div>
            <div class="timer">
                <div class="time-unit">
                    <div class="time-value" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">0</div>
                    <div class="time-label">小时</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">0</div>
                    <div class="time-label">分钟</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <!-- Love letter section -->
        <div class="letter-section">
            <div class="letter-title">
                <span>💌</span> 给最爱的你
            </div>
            <div class="letter-content">
                亲爱的阿宇：<br><br>
                从我们牵起彼此手的那一刻起，我的世界就充满了幸福的光彩。<br><br>
                感谢你一直以来的陪伴、理解和支持。<br>
                未来的每一天，我都愿意与你携手度过。<br><br>
                💕 结婚周年快乐 💕<br>
                <br>
                — 爱你的鹏飞
            </div>
        </div>

        <div class="footer">
            <p>🎵 永远爱你 🎵</p>
        </div>
    </div>

    <script>
        <!-- Wedding date - 修改为你们的结婚日期 -->
        const weddingDate = new Date('2025-03-09 00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - weddingDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        // Update timer every second
        setInterval(updateTimer, 1000);
        updateTimer();

        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('heartsBg');
            const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '💝'];

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        createHearts();
    </script>
</body>
</html>
